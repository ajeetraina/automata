version: "3.9"

# ============================================================
# KidsStory AI — Docker Model Runner (DMR) edition
#
# LLM is now served by Docker Model Runner (built into
# Docker Desktop 4.40+) instead of an Ollama container.
#
# Setup:
#   docker desktop enable model-runner --tcp 12434
#   docker model pull ai/llama3.2
#   docker compose up -d
# ============================================================

x-gpu-deploy: &gpu-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-restart: &restart
  restart: unless-stopped

# Allows containers to reach DMR on the host via
# http://model-runner.docker.internal:12434
x-dmr-host: &dmr-host
  extra_hosts:
    - "model-runner.docker.internal:host-gateway"

services:

  # ── IMAGE GENERATOR — FLUX.1-dev ──────────────────────────
  flux:
    build:
      context: ./services/flux
      dockerfile: Dockerfile
    container_name: kidstory-flux
    <<: [*gpu-deploy, *restart]
    ports:
      - "7860:7860"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - ./output/images:/output/images
    environment:
      - HF_HOME=/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 60s
      timeout: 30s
      retries: 5

  # ── VIDEO GENERATOR — Wan2.1 ──────────────────────────────
  wan2:
    build:
      context: ./services/wan2
      dockerfile: Dockerfile
    container_name: kidstory-wan2
    <<: [*gpu-deploy, *restart]
    ports:
      - "7861:7861"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - ./output/videos:/output/videos
    environment:
      - HF_HOME=/root/.cache/huggingface
      - MODEL_ID=Wan-AI/Wan2.1-T2V-14B
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7861/health"]
      interval: 60s
      timeout: 30s
      retries: 5

  # ── VIDEO GENERATOR — CogVideoX (optional fallback) ───────
  cogvideox:
    build:
      context: ./services/cogvideox
      dockerfile: Dockerfile
    container_name: kidstory-cogvideox
    <<: [*gpu-deploy, *restart]
    ports:
      - "7862:7862"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - ./output/videos:/output/videos
    environment:
      - HF_HOME=/root/.cache/huggingface
      - MODEL_ID=THUDM/CogVideoX-5b-I2V
    profiles:
      - cogvideo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7862/health"]
      interval: 60s
      timeout: 30s
      retries: 5

  # ── TTS — Kokoro ──────────────────────────────────────────
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kidstory-kokoro
    <<: *restart
    ports:
      - "8880:8880"
    volumes:
      - kokoro-models:/app/models
    environment:
      - DEFAULT_VOICE=af_sky
      - SPEED=0.9
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── MUSIC — MusicGen ──────────────────────────────────────
  musicgen:
    build:
      context: ./services/musicgen
      dockerfile: Dockerfile
    container_name: kidstory-musicgen
    <<: [*gpu-deploy, *restart]
    ports:
      - "7863:7863"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - ./output/music:/output/music
    environment:
      - HF_HOME=/root/.cache/huggingface
      - MODEL_ID=facebook/musicgen-medium
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7863/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── FFMPEG ASSEMBLER ──────────────────────────────────────
  ffmpeg-api:
    build:
      context: ./services/ffmpeg-api
      dockerfile: Dockerfile
    container_name: kidstory-ffmpeg
    <<: *restart
    ports:
      - "8000:8000"
    volumes:
      - ./output:/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PIPELINE API ORCHESTRATOR ─────────────────────────────
  # NOTE: No Ollama service — LLM handled by Docker Model Runner on the host.
  # Containers reach DMR via model-runner.docker.internal (extra_hosts above).
  pipeline-api:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: kidstory-pipeline
    <<: [*restart, *dmr-host]
    ports:
      - "9000:9000"
    volumes:
      - ./output:/output
      - ./stories:/stories
    environment:
      # Docker Model Runner endpoint (host service, not a container)
      - DMR_BASE_URL=http://model-runner.docker.internal:12434/engines/v1
      - DMR_MODEL=ai/llama3.2          # override with ai/llama3.3 on Thor
      # Other services
      - FLUX_URL=http://flux:7860
      - WAN2_URL=http://wan2:7861
      - KOKORO_URL=http://kokoro:8880
      - MUSICGEN_URL=http://musicgen:7863
      - FFMPEG_URL=http://ffmpeg-api:8000
    depends_on:
      flux:
        condition: service_healthy
      wan2:
        condition: service_healthy
      kokoro:
        condition: service_healthy
      musicgen:
        condition: service_healthy
      ffmpeg-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  huggingface-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/huggingface-cache
  kokoro-models:

networks:
  default:
    name: kidstory-network
